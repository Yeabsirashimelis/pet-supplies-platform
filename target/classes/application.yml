server:
  port: 8080
  ssl:
    enabled: false
    key-store-type: PKCS12
    key-store: classpath:tls/server.p12
    key-store-password: changeit
    key-alias: pet-platform

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pet_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    session-hours: 12
    password-min-length: 8
    max-failed-logins: 5
    lock-minutes: 15
  inventory:
    default-alert-threshold: 10
  im:
    duplicate-fold-seconds: 10
    retention-days: 180
  reporting:
    cron: "0 0 2 * * ?"
  backup:
    full-cron: "0 0 1 * * ?"
    incremental-cron: "0 0 * * * ?"
    retention-days: 30
  cooking:
    autosave-seconds: 30

logging:
  level:
    root: INFO
    org.springframework.security: INFO
